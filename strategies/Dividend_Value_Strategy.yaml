name: high_dividend_guardian
display_name: 红利卫士策略
description: 专注 A 股高股息、低波动、财务稳健的个股。通过股息率与现金流双重锚定，构建防御性长线配置，适用于震荡市或中长期价值投资。

# 策略分类：value（价值/红利）
category: framework

# 关联的核心交易理念编号：1（严进策略）、5（风险排查）
core_rules: [1, 5]

# 策略需要使用的工具列表
required_tools:
  - get_financial_reports
  - get_dividend_history
  - get_valuation_metrics
  - get_daily_history

# 策略详细说明
instructions: |
  **红利卫士策略（High Dividend Guardian）**

  该策略的核心逻辑是筛选具有“真实分红能力”而非“虚假高息”的 A 股标的。

  1. **股息率锚定（核心门槛）**：
      - 使用 `get_valuation_metrics` 检查静态与滚动股息率。
      - **基准要求**：股息率需处于 4% - 8% 之间。
      - **异常排除**：若股息率 > 10%，须通过 `get_daily_history` 确认股价是否因暴雷而导致股息率被动升高（价值陷阱）。

  2. **股息稳定性（稳定性评估）**：
      - 使用 `get_dividend_history` 查看近 5 年分红记录。
      - **硬性指标**：连续 5 年分红未中断，且每股分红金额（DPS）波动率低，优先选择股息连年增长的企业。

  

  3. **盈利与分红真实性（安全性检查）**：
      - 使用 `get_financial_reports` 检查 **Payout Ratio（股息支付率）**。理想区间为 30% - 65%。
      - **现金流核验**：确保经营性现金流为正，且 **净现比（经营现金流 / 净利润）> 1.0**。
      - **债务排查**：资产负债率应处于行业中下游水平（通常 < 60%）。

  

  4. **估值水位（买点控制）**：
      - 对比当前 PE/PB 与历史分位。
      - 优先选择当前股息率高于其历史 5 年平均水平的标的。

  评分调整：
  - 股息率 > 5% 且净现比 > 1.2：sentiment_score +15
  - 股息连续 5 年保持增长：额外 +8
  - 股息支付率 > 80% 或净现比 < 0.8：sentiment_score -20（高风险）
  - 在 `buy_reason` 中注明“红利卫士策略：高股息与稳定现金流确认”。

  输出建议：
  - 明确给出该股的“股息安全性等级”（高/中/低）。
  - 计算当前的静态收益率与持有预期。
